# ============================================================
# MirrorMaker 2 Configuration for Active-Active DC/DR
# ============================================================
#
# Deployment:
#   - Run one MM2 instance at DC site (replicates DR→DC)
#   - Run one MM2 instance at DR site (replicates DC→DR)
#   OR
#   - Run a single MM2 instance with bidirectional replication
#
# Usage:
#   bin/connect-mirror-maker.sh kafka-mirror-maker2.properties
#
# ============================================================

# --- Cluster aliases ---
clusters = dc, dr

dc.bootstrap.servers = kafka-headless.cluster-dc.svc.cluster.local:9092
dr.bootstrap.servers = kafka-headless.cluster-dr.svc.cluster.local:9092

# ============================================================
# DC → DR replication
# Topics produced by DC services, replicated to DR Kafka
# ============================================================
dc->dr.enabled = true
dc->dr.topics = DC-DR, dc-provisioning

# ============================================================
# DR → DC replication
# Topics produced by DR services, replicated to DC Kafka
# ============================================================
dr->dc.enabled = true
dr->dc.topics = DR-DC, dr-provisioning

# ============================================================
# CRITICAL: Disable topic name prefixing
# By default MM2 renames topics as "dc.DC-DR" on the target.
# We need the SAME topic name on both clusters so our consumers
# can read from "DC-DR" on both DC and DR Kafka.
# ============================================================
replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

# --- Consumer offset sync (enables consumer group failover) ---
dc->dr.sync.group.offsets.enabled = true
dr->dc.sync.group.offsets.enabled = true
sync.group.offsets.interval.seconds = 10

# --- Heartbeat & checkpoint topics ---
emit.heartbeats.enabled = true
emit.heartbeats.interval.seconds = 5
emit.checkpoints.enabled = true
emit.checkpoints.interval.seconds = 30

# --- Replication tuning ---
replication.factor = 3
offset-syncs.topic.replication.factor = 3
heartbeats.topic.replication.factor = 3
checkpoints.topic.replication.factor = 3

# Number of replication tasks (increase for higher throughput)
tasks.max = 4

# --- Producer settings for replication ---
producer.acks = all
producer.linger.ms = 5
producer.batch.size = 65536
producer.buffer.memory = 33554432
producer.compression.type = lz4

# --- Consumer settings for replication ---
consumer.auto.offset.reset = earliest
consumer.max.poll.records = 500
