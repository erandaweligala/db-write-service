# ============================================================
# KAFKA MESSAGING — telco_aaa_dev profile overrides
# ============================================================
# Overrides only the keys that differ from application.properties for this
# profile (topic names, DLT names, and the tighter accounting-channel timings).
# Flat dotted keys — see application.properties for why these cannot live as
# nested dotted keys in YAML.
#
# The scheduler channels (db-write-events-scheduler / -scheduler-dr) are NOT
# redefined here, so they inherit their base config (and unique group.ids)
# from application.properties.
# ============================================================

# ------------------------------------------------------------
# DC->DR accounting channel  (topic: DC-DR)
# ------------------------------------------------------------
mp.messaging.incoming.db-write-events.topic=DC-DR
mp.messaging.incoming.db-write-events.max.poll.interval.ms=10000
mp.messaging.incoming.db-write-events.session.timeout.ms=10000
mp.messaging.incoming.db-write-events.heartbeat.interval.ms=3000
mp.messaging.incoming.db-write-events.dead-letter-queue.topic=DC-DR-DLT

# ------------------------------------------------------------
# DR->DC accounting channel (reverse)  (topic: DR-DC)
# ------------------------------------------------------------
mp.messaging.incoming.db-write-events-reverse.topic=DR-DC
mp.messaging.incoming.db-write-events-reverse.max.poll.interval.ms=10000
mp.messaging.incoming.db-write-events-reverse.session.timeout.ms=10000
mp.messaging.incoming.db-write-events-reverse.heartbeat.interval.ms=3000
mp.messaging.incoming.db-write-events-reverse.dead-letter-queue.topic=DR-DC-DLT

# ------------------------------------------------------------
# UMS MySQL DC channel  (topic: ums-mysql-aws in this profile)
# ------------------------------------------------------------
mp.messaging.incoming.mysql-db-write-events-dc.topic=ums-mysql-aws
mp.messaging.incoming.mysql-db-write-events-dc.group.id=spring-reply-group-ums
mp.messaging.incoming.mysql-db-write-events-dc.dead-letter-queue.topic=dlt-ums-mysql-aws
