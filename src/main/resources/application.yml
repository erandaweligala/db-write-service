# ============================================================
# LOCAL CONFIGURATION
# ============================================================

quarkus:
  http:
    port: 8085

  # =========================
  # ORACLE DATASOURCE (LOCAL)
  # =========================
  datasource:
    db-kind: oracle
    username: aaa_app
    password: password123

    reactive:
      url: oracle:thin:@localhost:1521/XEPDB1

    jdbc:
      url: oracle:thin:@localhost:1521/XEPDB1
      driver: oracle.jdbc.OracleDriver

  # =========================
  # LOGGING
  # =========================
  console:
    color: true

  log:
    level: INFO

    file:
      path: logs/db-write.log
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      rotation:
        max-file-size: 50M
        max-backup-index: 5
        rotate-on-boot: true

    console:
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"

    category:
      "org.apache.kafka":
        level: WARN
      "io.smallrye.reactive.messaging.kafka":
        level: INFO
      "io.quarkus.config":
        level: INFO
      "io.smallrye.config":
        level: INFO
      "com.csg.airtel.aaa4j":
        level: DEBUG

  # =========================
  # REDIS (LOCAL – NO SENTINEL)
  # =========================
  redis:
    hosts: redis://localhost:6379
    password: ""
    timeout: 60000

# ============================================================
# DATABASE POOL SETTINGS
# ============================================================

pool:
  max-size: 20
  connection-timeout: 5000
  idle-timeout: 600000
  max-lifetime: 1800000
  acquire-increment: 2
  prepared-statement-cache-max-size: 128
  pipelining-enabled: true
  pipelining-limit: 128
  event-loop-size: 16
  tcp-keep-alive: true
  tcp-no-delay: true
  pool-cleaner-enabled: true
  pool-cleaner-interval: 60000

# ============================================================
# KAFKA (LOCAL)
# ============================================================

kafka:
  bootstrap:
    servers: localhost:9092

mp:
  messaging:

    # ------------------------
    # DC → DR Channel (UNTOUCHED)
    # ------------------------
    incoming:
      db-write-events:
        connector: smallrye-kafka
        topic: dctodr-dc
        group.id: accounting-dc-group
        bootstrap.servers: localhost:9092
        value.deserializer: io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        failure-strategy: ignore

      # ------------------------
      # DR Provisioning Channel (FIXED)
      # ------------------------
      db-write-events-dr:
        connector: smallrye-kafka
        topic: dc-provisioning
        group.id: provisioning-reply-group
        bootstrap.servers: localhost:9092
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        # FIX 3: failure-strategy was missing heartbeat.interval.ms, meaning
        #         under slow DB writes the broker could mark the consumer dead
        #         mid-processing before the ack+reply could be sent.
        #         Also kept failure-strategy: ignore since the consumer already
        #         handles failures internally and sends FAIL replies itself —
        #         letting Quarkus nack would halt the consumer (same bug as before).
        failure-strategy: ignore

    # ------------------------
    # Reply Channel (to Spring) — UNTOUCHED
    # ------------------------
    outgoing:
      responses-out:
        connector: smallrye-kafka
        bootstrap.servers: localhost:9092
        topic: db-write-events-reply-plan,db-write-events-reply-provisioning
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        value.serializer: org.apache.kafka.common.serialization.StringSerializer
        linger.ms: 0
        acks: 1