quarkus:
  http:
    port: 8085

  otel:
    traces:
      exporter: none

  micrometer:
    enabled: true
    export:
      prometheus:
        enabled: true
        path: /q/metrics
    binder:
      jvm: true
      system: true
      vertx: true
      http-server:
        enabled: true
      http-client:
        enabled: true
      kafka:
        enabled: true
  # =========================
  # ORACLE DATASOURCE (LOCAL)
  # =========================
  datasource:
    db-kind: oracle
    username: aaa
    password: Aaa!89nky78D
    reactive:
      url: oracle:thin:@localhost:1524/ORCL

  # ---------------------------------------------------------------------------
  # Named MySQL datasource
  # ---------------------------------------------------------------------------
    mysql:                                  # <-- named datasource key
      db-kind: mysql
      username: "${MYSQL_USER}"
      password: "${MYSQL_PASSWORD}"
      reactive:
        url: mysql://mysql-host:3306/your_schema

  vertx:
    # High-TPS optimization: Match event loops to CPU cores for optimal performance
    event-loops-pool-size: 2
    internal-blocking-pool-size: 32
    warning-exception-time: 10s
    max-event-loop-execute-time: 5s
    max-worker-execute-time: 60s
    prefer-native-transport: true
    caching: false

  thread-pool:
    core-threads: 16
    max-threads: 48
    queue-size: 250
    growth-resistance: 0
    shutdown-timeout: 30s

  # =========================
  # LOGGING
  # =========================
  console:
    color: true

  log:
    level: INFO

    console:
      format: "[%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}] %-5p [%c][%t][%X{traceId}][%X{userName}][%X{sessionId}] %s%e%n"
      async:
        queue-length: 8192
        overflow: discard
      enabled: true

    file:
      enabled: true
      level: INFO
      path: "/var/log/dte/${HOSTNAME:unknown}.log"
      format: "[%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}] %-5p [%c][%t][%X{traceId}][%X{userName}][%X{sessionId}] %s%e%n"
      async:
        enable: true
        queue-length: 20000
        overflow: discard
      rotation:
        max-file-size: 60M
        max-backup-index: 10
        rotate-on-boot: true

    category:
      "org.apache.kafka":
        level: ERROR
      "io.smallrye.reactive.messaging.kafka":
        level: ERROR
      "io.quarkus.config":
        level: ERROR
      "io.smallrye.config":
        level: ERROR
      "com.csg.airtel.aaa4j":
        level: INFO

  # =========================
  # REDIS (LOCAL – NO SENTINEL)
  # =========================
  redis:
    hosts: redis://localhost:6379
    password: ""
    timeout: 60000

# ============================================================
# DATABASE POOL SETTINGS
# ============================================================

pool:
  max-size: 20
  connection-timeout: 5000
  idle-timeout: 600000
  max-lifetime: 1800000
  acquire-increment: 2
  prepared-statement-cache-max-size: 128
  pipelining-enabled: true
  pipelining-limit: 128
  event-loop-size: 16
  tcp-keep-alive: true
  tcp-no-delay: true
  pool-cleaner-enabled: true
  pool-cleaner-interval: 60000

mysql-pool:
  max-size: 50
  connection-timeout: 5000
  idle-timeout: 600000
  max-lifetime: 1800000
  prepared-statement-cache-max-size: 256
  pipelining-enabled: true
  pipelining-limit: 256
  event-loop-size: 32
  tcp-keep-alive: true
  tcp-no-delay: true
  pool-cleaner-enabled: true
  pool-cleaner-interval: 60000

app:
  site: DC

kafka:
  bootstrap:
    servers: localhost:9092

# ============================================================
# DB WRITE RESILIENCE (in-app retry on transient DB failure)
# ============================================================
# Transient failures (connection lost, timeout, deadlock, circuit OPEN) are retried
# in-process with exponential backoff. Only AFTER retries are exhausted does the
# message get sent to its dead-letter topic — guaranteeing zero data loss.
db:
  retry:
    attempts: 5                # 5 attempts ≈ 200ms+400ms+800ms+1.6s+3.2s ≈ 6s of retry
    initial-backoff-ms: 200
    max-backoff-ms: 5000

# ============================================================
# KAFKA REACTIVE MESSAGING
# ============================================================
# Moved to application.properties. Kafka per-channel settings use dotted keys
# (group.id, auto.offset.reset, dead-letter-queue.topic, ...) which do NOT
# bind when written as literal dotted keys nested under a channel node in YAML.
# See src/main/resources/application.properties.
