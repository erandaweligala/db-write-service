
quarkus:
  http:
    port: 8085

  # =========================
  # ORACLE DATASOURCE (LOCAL)
  # =========================
  datasource:
    db-kind: oracle
    username: aaa_app
    password: password123

    reactive:
      url: oracle:thin:@localhost:1521/XEPDB1

    jdbc:
      url: oracle:thin:@localhost:1521/XEPDB1
      driver: oracle.jdbc.OracleDriver

  # =========================
  # LOGGING
  # =========================
  console:
    color: true

  log:
    level: INFO

    file:
      path: logs/db-write.log
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      rotation:
        max-file-size: 50M
        max-backup-index: 5
        rotate-on-boot: true

    console:
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"

    category:
      "org.apache.kafka":
        level: WARN
      "io.smallrye.reactive.messaging.kafka":
        level: INFO
      "io.quarkus.config":
        level: INFO
      "io.smallrye.config":
        level: INFO
      "com.csg.airtel.aaa4j":
        level: DEBUG

  # =========================
  # REDIS (LOCAL – NO SENTINEL)
  # =========================
  redis:
    hosts: redis://localhost:6379
    password: ""
    timeout: 60000

# ============================================================
# DATABASE POOL SETTINGS
# ============================================================

pool:
  max-size: 20
  connection-timeout: 5000
  idle-timeout: 600000
  max-lifetime: 1800000
  acquire-increment: 2
  prepared-statement-cache-max-size: 128
  pipelining-enabled: true
  pipelining-limit: 128
  event-loop-size: 16
  tcp-keep-alive: true
  tcp-no-delay: true
  pool-cleaner-enabled: true
  pool-cleaner-interval: 60000


# =========================
# SITE IDENTITY
# =========================
# Set to DC or DR depending on which site this instance runs on.
# Override per-environment via QUARKUS_PROFILE or app.site env variable.
app:
  site: DC

kafka:
  bootstrap:
    servers: localhost:9092

mp:
  messaging:

    incoming:
      # ------------------------------------------------
      # DC→DR accounting channel
      # Events published by DC-side services (Auth, Accounting, CDR, etc.)
      # Mirrored to DR Kafka cluster via cross-site replication.
      # Both DC and DR DB Write Services consume this topic.
      # ------------------------------------------------
      db-write-events:
        connector: smallrye-kafka
        topic: DC-DR
        group.id: accounting-dc-group
        bootstrap.servers: localhost:9092
        value.deserializer: io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        failure-strategy: ignore

      # ------------------------------------------------
      # DR→DC accounting channel (reverse direction)
      # Events published by DR-side services when DR is active.
      # Mirrored to DC Kafka cluster via cross-site replication.
      # Both DC and DR DB Write Services consume this topic.
      # ------------------------------------------------
      db-write-events-reverse:
        connector: smallrye-kafka
        topic: DR-DC
        group.id: accounting-dr-group
        bootstrap.servers: localhost:9092
        value.deserializer: io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        failure-strategy: ignore

      # ------------------------------------------------
      # DC→DR provisioning channel (request-reply)
      # ------------------------------------------------
      db-write-events-dr:
        connector: smallrye-kafka
        topic: dc-provisioning
        group.id: provisioning-reply-group
        bootstrap.servers: localhost:9092
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        failure-strategy: ignore

      # ------------------------------------------------
      # DR→DC provisioning channel (reverse request-reply)
      # ------------------------------------------------
      db-write-events-dc:
        connector: smallrye-kafka
        topic: dr-provisioning
        group.id: provisioning-reply-dc-group
        bootstrap.servers: localhost:9092
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        failure-strategy: ignore

    # ------------------------------------------------
    # Outgoing: provisioning reply channel
    # Topic is set dynamically per-message via metadata.
    # ------------------------------------------------
    outgoing:
      responses-out:
        connector: smallrye-kafka
        bootstrap.servers: localhost:9092
        value.serializer: org.apache.kafka.common.serialization.StringSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
