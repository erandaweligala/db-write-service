  otel:
    traces:
      exporter: none

  micrometer:
    enabled: true
    export:
      prometheus:
        enabled: true
        path: /q/metrics
    binder:
      jvm: true
      system: true
      vertx: true
      http-server:
        enabled: true
      http-client:
        enabled: true
      kafka:
        enabled: true
  # =========================
  # ORACLE DATASOURCE (LOCAL)
  # =========================
  datasource:
    db-kind: oracle
    username: aaa
    password: Aaa!89nky78D
    reactive:
      url: oracle:thin:@localhost:1524/ORCL



  vertx:
    # High-TPS optimization: Match event loops to CPU cores for optimal performance
    event-loops-pool-size: 2
    internal-blocking-pool-size: 32
    warning-exception-time: 10s
    max-event-loop-execute-time: 5s
    max-worker-execute-time: 60s
    prefer-native-transport: true
    caching: false

  thread-pool:
    core-threads: 16
    max-threads: 48
    queue-size: 250
    growth-resistance: 0
    shutdown-timeout: 30s

  # =========================
  # LOGGING
  # =========================
  console:
    color: true

  log:
    level: INFO

    console:
      format: "[%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}] %-5p [%c][%t][%X{traceId}][%X{userName}][%X{sessionId}] %s%e%n"
      async:
        queue-length: 8192
        overflow: discard
      enabled: true

    file:
      enabled: true
      level: INFO
      path: "/var/log/dte/${HOSTNAME:unknown}.log"
      format: "[%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}] %-5p [%c][%t][%X{traceId}][%X{userName}][%X{sessionId}] %s%e%n"
      async:
        enable: true
        queue-length: 20000
        overflow: discard
      rotation:
        max-file-size: 60M
        max-backup-index: 10
        rotate-on-boot: true

    category:
      "org.apache.kafka":
        level: ERROR
      "io.smallrye.reactive.messaging.kafka":
        level: ERROR
      "io.quarkus.config":
        level: ERROR
      "io.smallrye.config":
        level: ERROR
      "com.csg.airtel.aaa4j":
        level: INFO

  # =========================
  # REDIS (LOCAL – NO SENTINEL)
  # =========================
  redis:
    hosts: redis://localhost:6379
    password: ""
    timeout: 60000

# ============================================================
# DATABASE POOL SETTINGS
# ============================================================

pool:
  max-size: 20
  connection-timeout: 5000
  idle-timeout: 600000
  max-lifetime: 1800000
  acquire-increment: 2
  prepared-statement-cache-max-size: 128
  pipelining-enabled: true
  pipelining-limit: 128
  event-loop-size: 16
  tcp-keep-alive: true
  tcp-no-delay: true
  pool-cleaner-enabled: true
  pool-cleaner-interval: 60000


app:
  site: DC

kafka:
  bootstrap:
    servers: localhost:9092

# ============================================================
# DB WRITE RESILIENCE (in-app retry on transient DB failure)
# ============================================================
# Transient failures (connection lost, timeout, deadlock, circuit OPEN) are retried
# in-process with exponential backoff. Only AFTER retries are exhausted does the
# message get sent to its dead-letter topic — guaranteeing zero data loss.
db:
  retry:
    attempts: 5                # 5 attempts ≈ 200ms+400ms+800ms+1.6s+3.2s ≈ 6s of retry
    initial-backoff-ms: 200
    max-backoff-ms: 5000

# ============================================================
# DLQ REPROCESSING (replay dead-letter topics back to the DB)
# ============================================================
# On-demand (and optionally scheduled) recovery of records that were dead-lettered
# during a DB outage or a since-fixed bug. Each record is replayed through the same
# resilient DB-write path; on success the offset is committed, on repeated failure the
# record is re-queued (attempt+1) and, once the attempt budget is spent, moved to a
# parked topic — never silently dropped.
#
# Trigger:
#   POST /api/dlq/reprocess/{topic}?max=N   – drain one DLT
#   POST /api/dlq/reprocess-all?max=N       – drain every configured DLT
#   GET  /api/dlq/topics                    – list configured DLTs + reprocess metrics
dlq:
  reprocess:
    enabled: true
    bootstrap-servers: ${kafka.bootstrap.servers:localhost:9092}
    group-id: db-write-dlq-reprocessor
    max-messages: 500          # per-topic cap per run (0 in a request => this default)
    max-poll-records: 100
    poll-timeout-ms: 2000
    time-budget-ms: 60000      # hard wall-clock cap for a single topic drain
    replay-timeout-ms: 30000   # max wait for one DB replay (incl. in-app retries)
    max-attempts: 3            # replay tries before a record is parked
    parked-topic-suffix: .PARKED
    # DLT topics eligible for replay (allow-list enforced by the REST surface).
    topics:
      - accounting-db-dc-DLT
      - dr.accounting-db-dc-DLT
      - dc-provisioning-DLT
    # Optional unattended replay. Disabled by default; the cron only fires when
    # schedule.enabled=true. Quartz cron syntax (sec min hour day-of-month month day-of-week).
    schedule:
      enabled: false
      cron: "0 0/15 * * * ?"   # every 15 minutes when enabled
      max-messages: 0          # 0 => use dlq.reprocess.max-messages

mp:
  messaging:
    incoming:
      db-write-events:
        connector: smallrye-kafka
        topic: accounting-db-dc
        group.id: accounting-dc-group
        value.deserializer: io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        # On terminal failure (retries exhausted OR permanent error) forward the
        # original Kafka record to a dead-letter topic so the payload is preserved
        # for replay / triage. NEVER use "ignore" — that silently drops data.
        failure-strategy: dead-letter-queue
        dead-letter-queue.topic: accounting-db-dc-DLT
        dead-letter-queue.key.serializer: org.apache.kafka.common.serialization.StringSerializer
        dead-letter-queue.value.serializer: org.apache.kafka.common.serialization.ByteArraySerializer

      db-write-events-mirrored:
        connector: smallrye-kafka
        topic: dr.accounting-db-dc
        group.id: accounting-dr-group
        value.deserializer: io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        failure-strategy: dead-letter-queue
        dead-letter-queue.topic: dr.accounting-db-dc-DLT
        dead-letter-queue.key.serializer: org.apache.kafka.common.serialization.StringSerializer
        dead-letter-queue.value.serializer: org.apache.kafka.common.serialization.ByteArraySerializer
