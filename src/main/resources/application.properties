# ============================================================
# KAFKA REACTIVE MESSAGING CONFIGURATION
# ============================================================
# IMPORTANT: Kafka per-channel settings MUST live here as flat, dotted keys.
# Quarkus/SmallRye YAML does NOT bind literal dotted keys written under a
# channel node (e.g. `group.id:` nested inside `db-write-events:`). Only
# single-segment keys (`connector`, `topic`, `failure-strategy`) bind there;
# everything with a dot (group.id, auto.offset.reset, session.timeout.ms,
# value.deserializer, dead-letter-queue.topic, ...) is silently ignored and
# falls back to Kafka defaults. That caused every consumer to default its
# group.id to the application name ("db-write-service"), collapsing all
# channels into ONE group with mismatched subscriptions -> endless rebalance
# loop -> consumers evicted. Flat keys in application.properties always bind.
#
# RULE: every incoming channel MUST have its own unique group.id. Two channels
# in the same group subscribing to different topics re-triggers the loop.
# ============================================================

# ------------------------------------------------------------
# DC->DR accounting channel  (topic: accounting-db-dc)
# ------------------------------------------------------------
mp.messaging.incoming.db-write-events.connector=smallrye-kafka
mp.messaging.incoming.db-write-events.topic=accounting-db-dc
mp.messaging.incoming.db-write-events.group.id=accounting-dc-group
mp.messaging.incoming.db-write-events.value.deserializer=io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
mp.messaging.incoming.db-write-events.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.db-write-events.auto.offset.reset=earliest
mp.messaging.incoming.db-write-events.enable.auto.commit=false
mp.messaging.incoming.db-write-events.max.poll.records=100
mp.messaging.incoming.db-write-events.max.poll.interval.ms=300000
mp.messaging.incoming.db-write-events.session.timeout.ms=30000
mp.messaging.incoming.db-write-events.heartbeat.interval.ms=10000
mp.messaging.incoming.db-write-events.failure-strategy=dead-letter-queue
mp.messaging.incoming.db-write-events.dead-letter-queue.topic=accounting-db-dc-DLT
mp.messaging.incoming.db-write-events.dead-letter-queue.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.db-write-events.dead-letter-queue.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer

