# Server Configuration Dev
quarkus:
  http:
    port: 8085
  datasource:
    db-kind: oracle
    username: "${DB_USER}"
    password: "${DB_PASSWORD}"
    reactive:
      url: oracle:thin:@aaa-dev.cn8eyeqma3tp.ap-southeast-2.rds.amazonaws.com:1521/ORCL
    jdbc:
      url: oracle:thin:@aaa-dev.cn8eyeqma3tp.ap-southeast-2.rds.amazonaws.com:1521/ORCL
      driver: oracle.jdbc.OracleDriver

    mysql:
      db-kind: mysql
      username: authuser
      password: authuser@123
      reactive:
        url: mysql://mysql.elasti.svc.cluster.local:3306/adauth?createDatabaseIfNotExist=true&serverTimezone=UTC


  console:
    color: true
  log:
    level: INFO
    file:
      path: /var/log/db-write/db-write.log
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      rotation:
        max-file-size: 100M
        max-backup-index: 10
        rotate-on-boot: true
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
    category:
      "org.apache.kafka":
        level: WARN
      "io.smallrye.reactive.messaging.kafka":
        level: INFO
      "io.quarkus.config":
        level: INFO
      "io.smallrye.config":
        level: INFO
      "com.csg.airtel.aaa4j":
        level: INFO

  redis:
    client-type: sentinel
    hosts: redis://redis-cluster.cluster-redis.svc.cluster.local:26379
    master-name: "${REDIS_MASTER_NAME}"
    role: "${REDIS_ROLE}"
    password: "${REDIS_PASSWORD}"
    max-pool-size: 300
    max-waiting-handlers: 5000
    max-pool-waiting: 800
    pool-recycle-timeout: 240000
    reconnect-attempts: 3
    reconnect-interval: 500
    pool-cleaner-interval: 20000
    timeout: 60000

pool:
  max-size: 50                      # Max connections
  connection-timeout: 5000          # 5 seconds to acquire connection
  idle-timeout: 600000              # 10 minutes idle before closing
  max-lifetime: 1800000             # 30 minutes max connection lifetime
  acquire-increment: 4              # Connections to acquire at once
  prepared-statement-cache-max-size: 256  # Cache prepared statements
  pipelining-enabled: true          # Enable query pipelining
  pipelining-limit: 256             # Max pipelined queries
  event-loop-size: 32               # Match vertx event-loops-pool-size
  tcp-keep-alive: true              # Detect dead connections
  tcp-no-delay: true                # Reduce latency
  pool-cleaner-enabled: true        # Clean idle connections
  pool-cleaner-interval: 60000      # Clean every minute

mysql-pool:
  max-size: 50
  connection-timeout: 5000
  idle-timeout: 600000
  max-lifetime: 1800000
  prepared-statement-cache-max-size: 256
  pipelining-enabled: true
  pipelining-limit: 256
  event-loop-size: 32
  tcp-keep-alive: true
  tcp-no-delay: true
  pool-cleaner-enabled: true
  pool-cleaner-interval: 60000

# =========================
# SITE IDENTITY
# =========================
# Override with app.site=DR for DR-site deployment
app:
  site: AWS

# Kafka Configuration

kafka:
  bootstrap:
    servers: kafka-headless.cluster-dc.svc.cluster.local:9092

# DB write resilience — retry transient DB failures in-app, DLT terminal ones.
db:
  retry:
    attempts: 5
    initial-backoff-ms: 200
    max-backoff-ms: 5000

# ============================================================
# KAFKA REACTIVE MESSAGING (telco_aaa_dev profile)
# ============================================================
# Every dotted Kafka key is written as NESTED YAML (one indent per dot).
# Literal dotted keys (e.g. `group.id:`) do NOT bind under a channel node.
# Each incoming channel has its own unique group.id.
mp:
  messaging:
    incoming:
      # DC->DR accounting channel (topic: DC-DR)
      db-write-events:
        connector: smallrye-kafka
        topic: DC-DR
        group:
          id: accounting-dc-group
        # value.deserializer intentionally omitted: Quarkus derives it from the
        # @Incoming payload type. The base ObjectMapperDeserializer has no no-arg
        # constructor and cannot be referenced directly (would need a typed subclass).
        key:
          deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto:
          offset:
            reset: earliest
        enable:
          auto:
            commit: false
        max:
          poll:
            records: 100
            interval:
              ms: 10000
        session:
          timeout:
            ms: 10000
        heartbeat:
          interval:
            ms: 3000
        failure-strategy: dead-letter-queue
        dead-letter-queue:
          topic: DC-DR-DLT
          key:
            serializer: org.apache.kafka.common.serialization.StringSerializer
          value:
            serializer: org.apache.kafka.common.serialization.ByteArraySerializer

      # DR->DC accounting channel, reverse (topic: DR-DC)
      db-write-events-reverse:
        connector: smallrye-kafka
        topic: DR-DC
        group:
          id: accounting-dr-group
        # value.deserializer intentionally omitted: Quarkus derives it from the
        # @Incoming payload type. The base ObjectMapperDeserializer has no no-arg
        # constructor and cannot be referenced directly (would need a typed subclass).
        key:
          deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto:
          offset:
            reset: earliest
        enable:
          auto:
            commit: false
        max:
          poll:
            records: 100
            interval:
              ms: 10000
        session:
          timeout:
            ms: 10000
        heartbeat:
          interval:
            ms: 3000
        failure-strategy: dead-letter-queue
        dead-letter-queue:
          topic: DR-DC-DLT
          key:
            serializer: org.apache.kafka.common.serialization.StringSerializer
          value:
            serializer: org.apache.kafka.common.serialization.ByteArraySerializer

      # DC->DR provisioning channel, request-reply (topic: dc-provisioning)
      db-write-events-dr:
        connector: smallrye-kafka
        topic: dc-provisioning
        group:
          id: provisioning-reply-group
        value:
          deserializer: org.apache.kafka.common.serialization.StringDeserializer
        key:
          deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto:
          offset:
            reset: earliest
        enable:
          auto:
            commit: false
        max:
          poll:
            records: 100
            interval:
              ms: 300000
        session:
          timeout:
            ms: 30000
        heartbeat:
          interval:
            ms: 10000
        failure-strategy: dead-letter-queue
        dead-letter-queue:
          topic: dc-provisioning-DLT
          key:
            serializer: org.apache.kafka.common.serialization.StringSerializer
          value:
            serializer: org.apache.kafka.common.serialization.StringSerializer

      # DR->DC provisioning channel, reverse request-reply (topic: dr-provisioning)
      db-write-events-dc:
        connector: smallrye-kafka
        topic: dr-provisioning
        group:
          id: provisioning-reply-dc-group
        value:
          deserializer: org.apache.kafka.common.serialization.StringDeserializer
        key:
          deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto:
          offset:
            reset: earliest
        enable:
          auto:
            commit: false
        max:
          poll:
            records: 100
            interval:
              ms: 300000
        session:
          timeout:
            ms: 30000
        heartbeat:
          interval:
            ms: 10000
        failure-strategy: dead-letter-queue
        dead-letter-queue:
          topic: dr-provisioning-DLT
          key:
            serializer: org.apache.kafka.common.serialization.StringSerializer
          value:
            serializer: org.apache.kafka.common.serialization.StringSerializer

      # UMS MySQL DC channel (topic: ums-mysql-aws in this profile)
      mysql-db-write-events-dc:
        connector: smallrye-kafka
        topic: ums-mysql-aws
        group:
          id: spring-reply-group-ums
        value:
          deserializer: org.apache.kafka.common.serialization.StringDeserializer
        key:
          deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto:
          offset:
            reset: earliest
        enable:
          auto:
            commit: false
        max:
          poll:
            records: 50
            interval:
              ms: 300000
        session:
          timeout:
            ms: 30000
        heartbeat:
          interval:
            ms: 10000
        failure-strategy: dead-letter-queue
        dead-letter-queue:
          topic: dlt-ums-mysql-aws
          key:
            serializer: org.apache.kafka.common.serialization.StringSerializer
          value:
            serializer: org.apache.kafka.common.serialization.StringSerializer

      # UMS MySQL DR channel (topic: ums-mysql-dr)
      mysql-db-write-events-dr:
        connector: smallrye-kafka
        topic: ums-mysql-dr
        group:
          id: spring-reply-group-ums-dr
        value:
          deserializer: org.apache.kafka.common.serialization.StringDeserializer
        key:
          deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto:
          offset:
            reset: earliest
        enable:
          auto:
            commit: false
        max:
          poll:
            records: 50
            interval:
              ms: 300000
        session:
          timeout:
            ms: 30000
        heartbeat:
          interval:
            ms: 10000
        failure-strategy: dead-letter-queue
        dead-letter-queue:
          topic: dlt-ums-mysql-dr
          key:
            serializer: org.apache.kafka.common.serialization.StringSerializer
          value:
            serializer: org.apache.kafka.common.serialization.StringSerializer

    # Outgoing: provisioning reply channel (topic set dynamically per-message)
    outgoing:
      responses-out:
        connector: smallrye-kafka
        value:
          serializer: org.apache.kafka.common.serialization.StringSerializer
        key:
          serializer: org.apache.kafka.common.serialization.StringSerializer
