# ============================================================
# DR SITE CONFIGURATION
# ============================================================
# This profile is used when deploying the DB Write Service on
# the DR (Disaster Recovery) site in active-active mode.
#
# Key differences from DC profile:
#   - site.id = DR
#   - sync-inbound reads from DC-DR topic (events from DC)
#   - sync-outbound writes to DR-DC topic (events to DC)
#   - Kafka bootstrap points to DR cluster
#   - Oracle connects to DR database
# ============================================================

quarkus:
  http:
    port: 8085
  datasource:
    db-kind: oracle
    username: aaa
    password: ${DR_DB_PASSWORD:Aaa!89nky78D}
    reactive:
      url: oracle:thin:@${DR_DB_HOST:aaa-dr.cn8eyeqma3tp.ap-southeast-2.rds.amazonaws.com}:1521/ORCL
    jdbc:
      url: oracle:thin:@${DR_DB_HOST:aaa-dr.cn8eyeqma3tp.ap-southeast-2.rds.amazonaws.com}:1521/ORCL
      driver: oracle.jdbc.OracleDriver

  console:
    color: true
  log:
    level: INFO
    file:
      path: /var/log/db-write/db-write.log
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      rotation:
        max-file-size: 100M
        max-backup-index: 10
        rotate-on-boot: true
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
    category:
      "org.apache.kafka":
        level: WARN
      "io.smallrye.reactive.messaging.kafka":
        level: INFO
      "io.quarkus.config":
        level: INFO
      "io.smallrye.config":
        level: INFO
      "com.csg.airtel.aaa4j":
        level: INFO

  redis:
    client-type: sentinel
    hosts: redis://redis-cluster.cluster-redis-dr.svc.cluster.local:26379
    master-name: mymaster
    role: master
    password: ${DR_REDIS_PASSWORD:AAAtest_Redis_Pass_w0rd!}
    max-pool-size: 300
    max-waiting-handlers: 5000
    max-pool-waiting: 800
    pool-recycle-timeout: 240000
    reconnect-attempts: 3
    reconnect-interval: 500
    pool-cleaner-interval: 20000
    timeout: 60000

pool:
  max-size: 50
  connection-timeout: 5000
  idle-timeout: 600000
  max-lifetime: 1800000
  acquire-increment: 4
  prepared-statement-cache-max-size: 256
  pipelining-enabled: true
  pipelining-limit: 256
  event-loop-size: 32
  tcp-keep-alive: true
  tcp-no-delay: true
  pool-cleaner-enabled: true
  pool-cleaner-interval: 60000

# Kafka Configuration — DR cluster
kafka:
  bootstrap:
    servers: kafka-headless.cluster-dr.svc.cluster.local:9092

mp:
  messaging:
    incoming:
      db-write-events:
        connector: smallrye-kafka
        topic: DC-DR
        group.id: accounting-dr-group
        value.deserializer: io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 10000
        session.timeout.ms: 10000
        heartbeat.interval.ms: 3000
        failure-strategy: ignore

      db-write-events-dr:
        connector: smallrye-kafka
        topic: dr-provisioning
        group.id: provisioning-reply-dr-group
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        failure-strategy: ignore

      # BIDIRECTIONAL SYNC: DR reads from DC-DR topic (events from DC)
      sync-inbound:
        connector: smallrye-kafka
        topic: DC-DR
        group.id: sync-inbound-dr-group
        bootstrap.servers: kafka-headless.cluster-dr.svc.cluster.local:9092
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        failure-strategy: ignore

    outgoing:
      responses-out:
        connector: smallrye-kafka
        topic: db-write-events-reply-plan,db-write-events-reply-provisioning
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        value.serializer: org.apache.kafka.common.serialization.StringSerializer
        bootstrap.servers: kafka-headless.cluster-dr.svc.cluster.local:9092
        linger.ms: 0
        acks: 1

      # BIDIRECTIONAL SYNC: DR writes to DR-DC topic (events to DC)
      sync-outbound:
        connector: smallrye-kafka
        bootstrap.servers: kafka-headless.cluster-dr.svc.cluster.local:9092
        topic: DR-DC
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        value.serializer: org.apache.kafka.common.serialization.StringSerializer
        linger.ms: 5
        acks: all
        retries: 3
        enable.idempotence: true

# Site identity — DR deployment
site:
  id: DR
  sync-enabled: true
  dedup-ttl-seconds: 300
  dedup-max-size: 100000
